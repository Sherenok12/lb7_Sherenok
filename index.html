<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Todo Firebase</title>
     <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Список справ</h1>

    <button onclick="newTodo()">
        Нова справа
    </button>

    <p id="loading" style="display:none;">

    <p>
        Не виконано:

    </p>

    <script src="java.js"></script>

</body>
</html>
